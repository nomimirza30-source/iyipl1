version: "3.8"

services:
  backend:
    build:
      context: ./iyipl-backend
      dockerfile: Dockerfile
    container_name: iyipl_backend
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./iyipl-frontend
      dockerfile: Dockerfile
    container_name: iyipl_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data: {}
